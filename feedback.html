<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
			color: #black;
        }
        
        .container {
            max-width: 500px;
            margin: 100px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
			color: #black;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            background-color: white;
            color: black;
        }

        textarea {
            height: 60px;
            resize: none;
        }

        .rating {
            margin-bottom: 20px;
            text-align: center;
        }

        .rating input[type="radio"] {
            display: none;
        }

        .rating label {
            display: inline-block;
            cursor: pointer;
            font-size: 24px;
            color: #black;
        }

        .rating input[type="radio"] + label {
            color: #ccc;
        }

        .rating input[type="radio"]:checked + label {
            color: #ffcc00;
        }

        .submit-btn {
            background-color: #1167b1;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .submit-btn:hover {
            background-color: #0b4c82;
        }

        .thank-you {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            color: #black;
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 16px;
            color: #1167b1;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #0b4c82;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Feedback</h1>
        <form id="feedback-form">
            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Leave a comment:</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <div class="form-group rating">
                <label for="rating">Please Rate the website:</label><br>
                <input type="radio" id="rating1" name="rating" value="5"><label for="rating1">★</label>
                <input type="radio" id="rating2" name="rating" value="4"><label for="rating2">★</label>
                <input type="radio" id="rating3" name="rating" value="3"><label for="rating3">★</label>
                <input type="radio" id="rating4" name="rating" value="2"><label for="rating4">★</label>
                <input type="radio" id="rating5" name="rating" value="1"><label for="rating5">★</label>
            </div>
            <button type="submit" class="submit-btn">Submit</button>
        </form>
        <div id="thank-you" class="thank-you" style="display: none;">Thank you for your feedback!</div>
        <a href="#" class="back-btn" onclick="history.go(-1);">Go Back</a>
        <a href="index.html" class="back-btn">Home</a>
    </div>

    <script>
        document.getElementById('feedback-form').addEventListener('submit', function(event) {
            event.preventDefault();
            document.getElementById('feedback-form').style.display = 'none';
            document.getElementById('thank-you').style.display = 'block';
        });
    </script>
</body>
</html>
